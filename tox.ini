[tox]
envlist = py3, docs, lint

[testenv]
deps = .[dev]
whitelist_externals = python3
commands = python3 -m unittest discover -s tests/naif_pds4_bundler

[testenv:docs]
deps = .[dev]
whitelist_externals = python3
                      sphinx-apidoc
commands = sphinx-apidoc -f -o docs/source src/pds
           sphinx-apidoc -f -o docs/source tests
           sphinx-build -b html docs/source docs/build

[testenv:lint]
deps = pre-commit
commands=
    python3 -m pre_commit run --color=always {posargs:--all}
skip_install = true

[testenv:dev]
basepython = python3.10
usedevelop = True
deps = .[dev]

[testenv:coverage]
# Environment specifically for SonarQube-ready coverage
# Force tox to use Python 3.10 for this environment
basepython = python3.10
deps = .[dev]
commands =
    pytest --cov-branch --cov-report=xml:coverage.xml
