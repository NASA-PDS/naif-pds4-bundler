name: Testing NPB 🪐

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering from any branch

jobs:
  unix-tests:
    name: Unix Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
  
    - name: Run tests
      run: python -m unittest discover tests/naif_pds4_bundler

  windows-wsl-tests:
    name: Windows/WSL Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Install WSL (Ubuntu-24.04)
        shell: pwsh
        run: |
          # Use --web-download to ensure reliability in CI
          wsl --install -d Ubuntu-24.04 --web-download --no-launch
          wsl --status

      - name: Install Python ${{ matrix.python-version }}
        shell: pwsh
        run: |
          # Use 'wsl -u root' to avoid sudo password prompts during install
          wsl -u root -- bash -c "apt update && apt install -y software-properties-common && add-apt-repository ppa:deadsnakes/ppa -y && apt update && apt install -y python${{ matrix.python-version }} python${{ matrix.python-version }}-venv"

      - name: Checkout repository inside WSL
        shell: pwsh
        run: |
          wsl -- bash -l -c "git clone https://github.com/${{ github.repository }}.git ~/project && cd ~/project && git fetch origin ${{ github.ref }} && git checkout FETCH_HEAD"

      - name: Install package
        shell: pwsh
        run: |
          wsl -- bash -l -c "cd ~/project && python${{ matrix.python-version }} -m venv venv && source venv/bin/activate && python -m pip install --upgrade pip && python -m pip install -e ."

      - name: Run tests
        shell: pwsh
        run: |
          wsl -- bash -l -c "cd ~/project && source venv/bin/activate && python -m unittest discover tests/naif_pds4_bundler"
