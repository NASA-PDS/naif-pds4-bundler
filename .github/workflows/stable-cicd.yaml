# рЯПГвАНвЩАпЄП Continuous Integration and Delivery: Stable
# ===============================================
#
# Note: for this workflow to succeed, the following secrets must be installed
# in the repository:
#
# ``ADMIN_GITHUB_TOKEN``
#     A personal access token of a user with collaborator or better access to
#     the project repository. You can generate this by visiting GitHub вЖТ
#     Settings вЖТ Developer settings вЖТ Personal access tokens вЖТ Generate new
#     token. Give the token scopes on ``repo``, ``write:packages``,
#     ``delete:packages``, ``workflow``, and ``read:gpg_key``.
# ``PYPI_USERNAME``
#     Username for pypi.org.
# ``PYPI_PASSWORD``
#     Password for ``PYPI_USERNAME``.
#


---

name: рЯШМ Stable integration & delivery


# Driving Event
# -------------
#
# What event starts this workflow: a push of a release tag. Note: according to
# https://git.io/JJZQt we have been doing our tag matching wrong. It's not
# regexp, it's not globвА¶it's more likeвА¶glob++ рЯШЃ

on:
    push:
        tags:
            - 'release/*'
concurrency: roundup


# Set permissions
# ---------------
#

permissions:
  contents: read

# What to Do
# ----------
#
# Round up, yee-haw!

jobs:
    stable-assembly:
        name: рЯРі Stable Assembly
        runs-on: ubuntu-latest
        steps:
            - name: Update CA certificates
              run: |
                  sudo apt-get update
                  sudo apt-get install --reinstall ca-certificates
                  sudo update-ca-certificates
            -
                name: рЯТ≥ Checkout
                uses: actions/checkout@v6
                with:
                    lfs: true
                    token: ${{secrets.ADMIN_GITHUB_TOKEN}}
                    fetch-depth: 0
            -
                name: рЯТµ Python Cache
                uses: actions/cache@v5
                with:
                    path: ~/.cache/pip
                    # The "key" used to indicate a set of cached files is the operating system runner
                    # plus "py" for Python-specific builds, plus a hash of the wheels, plus "pds" because
                    # we pds-prefix everything with "pds" in PDS! рЯШЕ
                    key: pds-${{runner.os}}-py-${{hashFiles('**/*.whl')}}
                    # To restore a set of files, we only need to match a prefix of the saved key.
                    restore-keys: pds-${{runner.os}}-py-
            -
                name: рЯ§† Roundup
                uses: NASA-PDS/roundup-action@stable
                with:
                    assembly: stable
                env:
                    pypi_username: ${{secrets.PYPI_USERNAME}}
                    pypi_password: ${{secrets.PYPI_PASSWORD}}
                    ADMIN_GITHUB_TOKEN: ${{secrets.ADMIN_GITHUB_TOKEN}}

...

